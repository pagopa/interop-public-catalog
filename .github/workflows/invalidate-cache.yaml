name: "Invalidate CloudFront distribution cache"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        type: environment
      cloudfront_distribution_id:
        description: "ID of the CloudFront distribution to invalidate"
        required: true
      invalidation_paths:
        description: "Paths to invalidate (space separated)"
        required: true

jobs:
  invalidate_cache:
    name: Invalidate CloudFront distribution cache
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ secrets.IAM_ROLE_ARN }}
          role-session-name: interop-public-catalog-invalidate-cache

      - name: Invalidate CloudFront Cache
        env: 
          CF_DISTRIBUTION_ID: ${{ inputs.cloudfront_distribution_id }}
          CF_INVALIDATION_PATHS: ${{ inputs.invalidation_paths }}
        run: |
          set -euo pipefail

          aws cloudfront create-invalidation \
            --distribution-id "$CF_DISTRIBUTION_ID" \
            --paths "$CF_INVALIDATION_PATHS"  #space separated